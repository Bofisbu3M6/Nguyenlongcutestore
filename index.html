<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyenlong メ LiOS Store</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>

<div class="logo">
    <i class="fa-solid fa-mobile-screen-button"></i>
    <h2>Nguyenlong メ LiOS Store</h2>
</div>

<div class="search">
    <input type="text" placeholder="Tìm kiếm sản phẩm...">
    <i class="fa-solid fa-magnifying-glass"></i>
</div>

</header>

<section class="banner">

<div class="overlay">

<h1>Nguyenlong メ LiOS Store</h1>

<p>Cửa hàng ứng dụng & dịch vụ LiOS</p>

<button>Mua ngay</button>

</div>

</section>

<section class="title">

<h2>Sản phẩm nổi bật</h2>

</section>

<section class="products">

<div class="card">

<img src="assets/products/product1.png">

<h3>LiOS Premium</h3>

<span class="active">ACTIVE</span>

<h4>199.000đ</h4>

<button>Mua ngay</button>

</div>

<div class="card">

<img src="assets/products/product2.png">

<h3>LiOS VIP</h3>

<span class="active">ACTIVE</span>

<h4>299.000đ</h4>

<button>Mua ngay</button>

</div>

<div class="card">

<img src="assets/products/product3.png">

<h3>LiOS Pro</h3>

<span class="active">ACTIVE</span>

<h4>499.000đ</h4>

<button>Mua ngay</button>

</div>

</section>

<nav class="bottom">

<a href="#">
<i class="fa-solid fa-house"></i>
<span>Trang chủ</span>
</a>

<a href="#">
<i class="fa-solid fa-store"></i>
<span>Cửa hàng</span>
</a>

<a href="#">
<i class="fa-solid fa-cart-shopping"></i>
<span>Giỏ hàng</span>
</a>

<a href="#">
<i class="fa-solid fa-user"></i>
<span>Tài khoản</span>
</a>

</nav>

<script src="script.js"></script>

</body>
</html>
