<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Giỏ hàng | Nguyenlong メ LiOS Store</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#08111f;
color:#fff;
}

header{
padding:20px 8%;
background:#101c32;
display:flex;
justify-content:space-between;
align-items:center;
}

header a{
color:white;
text-decoration:none;
}

.container{
width:90%;
max-width:1100px;
margin:40px auto;
}

.item{

display:flex;
justify-content:space-between;
align-items:center;

background:#101c32;

padding:20px;

border-radius:15px;

margin-bottom:20px;

}

.left{

display:flex;

align-items:center;

gap:20px;

}

.left img{

width:90px;

height:90px;

border-radius:12px;

object-fit:cover;

}

.name{

font-size:20px;

font-weight:bold;

}

.price{

margin-top:8px;

color:#00bfff;

}

.remove{

background:#ff4444;

color:white;

border:none;

padding:10px 18px;

border-radius:8px;

cursor:pointer;

}

.remove:hover{

background:#ff0000;

}

.total{

margin-top:30px;

background:#101c32;

padding:25px;

border-radius:15px;

}

.total h2{

margin-bottom:15px;

}

.checkout{

width:100%;

margin-top:20px;

padding:15px;

background:#00bfff;

border:none;

border-radius:12px;

color:white;

font-size:18px;

cursor:pointer;

}

.checkout:hover{

background:#008cff;

}

.empty{

text-align:center;

padding:80px;

font-size:22px;

color:#aaa;

}

</style>

</head>

<body>

<header>

<h2>
Nguyenlong メ LiOS Store
</h2>

<a href="shop.html">

<i class="fa-solid fa-arrow-left"></i>

Tiếp tục mua

</a>

</header>

<div class="container">

<div id="cart"></div>

<div class="total">

<h2>

Tổng cộng:

<span id="money">0đ</span>

</h2>

<button class="checkout">

Thanh toán

</button>

</div>

</div>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

const box=document.getElementById("cart");

const money=document.getElementById("money");

function priceNumber(text){

return Number(text.replace(/[^\d]/g,""));

}

function load(){

box.innerHTML="";

let total=0;

if(cart.length===0){

box.innerHTML='<div class="empty">🛒 Giỏ hàng đang trống.</div>';

document.querySelector(".total").style.display="none";

return;

}

document.querySelector(".total").style.display="block";

cart.forEach((item,index)=>{

total+=priceNumber(item.price);

box.innerHTML+=`

<div class="item">

<div class="left">

<img src="${item.image || '../assets/products/product1.png'}">

<div>

<div class="name">${item.name}</div>

<div class="price">${item.price}</div>

</div>

</div>

<button class="remove" onclick="removeItem(${index})">

Xóa

</button>

</div>

`;

});

money.innerHTML=total.toLocaleString("vi-VN")+"đ";

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

load();

}

load();

document.querySelector(".checkout").onclick=function(){

if(cart.length===0){

alert("Giỏ hàng trống.");

return;

}

window.location="checkout.html";

};

</script>

</body>

</html>
