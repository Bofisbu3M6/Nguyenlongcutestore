<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thanh toán | Nguyenlong メ LiOS Store</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#08111f;
color:#fff;
}

header{
background:#101c32;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

header a{
color:#fff;
text-decoration:none;
}

.container{
width:90%;
max-width:1100px;
margin:40px auto;
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
}

.box{
background:#101c32;
padding:25px;
border-radius:18px;
}

.box h2{
margin-bottom:20px;
}

.input{
margin-bottom:18px;
}

.input label{
display:block;
margin-bottom:8px;
}

.input input,
.input textarea,
.input select{

width:100%;
padding:14px;
border:none;
outline:none;
border-radius:10px;
background:#162542;
color:white;

}

.product{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.total{
font-size:24px;
color:#00bfff;
margin-top:20px;
}

.pay{

width:100%;
margin-top:25px;
padding:15px;
border:none;
border-radius:12px;
background:#00bfff;
color:white;
font-size:18px;
cursor:pointer;

}

.pay:hover{

background:#0095ff;

}

.success{

display:none;

margin-top:20px;

padding:15px;

background:#00c853;

border-radius:10px;

text-align:center;

}

@media(max-width:850px){

.container{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<h2>Nguyenlong メ LiOS Store</h2>

<a href="cart.html">
<i class="fa-solid fa-arrow-left"></i>
Quay lại
</a>

</header>

<div class="container">

<div class="box">

<h2>Thông tin khách hàng</h2>

<div class="input">
<label>Họ và tên</label>
<input id="name" type="text">
</div>

<div class="input">
<label>Số điện thoại</label>
<input id="phone" type="tel">
</div>

<div class="input">
<label>Email</label>
<input id="email" type="email">
</div>

<div class="input">
<label>Địa chỉ</label>
<textarea id="address"></textarea>
</div>

<div class="input">
<label>Phương thức thanh toán</label>

<select id="method">

<option>Chuyển khoản</option>

<option>Ví điện tử</option>

<option>Thẻ ngân hàng</option>

</select>

</div>

<button class="pay">

Thanh toán ngay

</button>

<div class="success">

✅ Thanh toán thành công!

</div>

</div>

<div class="box">

<h2>Đơn hàng</h2>

<div id="list"></div>

<div class="total">

Tổng:
<span id="money">0đ</span>

</div>

</div>

</div>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

const list=document.getElementById("list");

const money=document.getElementById("money");

let total=0;

function numberPrice(text){

return Number(text.replace(/[^\d]/g,""));

}

cart.forEach(item=>{

total+=numberPrice(item.price);

list.innerHTML+=`

<div class="product">

<span>${item.name}</span>

<strong>${item.price}</strong>

</div>

`;

});

money.innerHTML=total.toLocaleString("vi-VN")+"đ";

document.querySelector(".pay").onclick=function(){

const name=document.getElementById("name").value;

const phone=document.getElementById("phone").value;

const email=document.getElementById("email").value;

const address=document.getElementById("address").value;

if(name==""||phone==""||email==""||address==""){

alert("Vui lòng nhập đầy đủ thông tin.");

return;

}

document.querySelector(".success").style.display="block";

localStorage.removeItem("cart");

setTimeout(()=>{

window.location="../index.html";

},2500);

};

</script>

</body>
</html>
