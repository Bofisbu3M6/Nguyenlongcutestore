<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đăng nhập | Nguyenlong メ LiOS Store</title>

<link rel="stylesheet" href="../style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{

display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#08111f,#13213b);

}

.login{

width:380px;

background:rgba(17,28,48,.9);

padding:40px;

border-radius:20px;

backdrop-filter:blur(20px);

box-shadow:0 0 30px rgba(0,191,255,.2);

}

.login h2{

text-align:center;

margin-bottom:30px;

}

.input{

margin-bottom:20px;

}

.input label{

display:block;

margin-bottom:8px;

}

.input input{

width:100%;

padding:14px;

border:none;

outline:none;

border-radius:12px;

background:#0f1d33;

color:white;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#00bfff;

color:white;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#0099ff;

}

p{

text-align:center;

margin-top:20px;

}

a{

color:#00bfff;

text-decoration:none;

}

</style>

</head>

<body>

<div class="login">

<h2>
<i class="fa-solid fa-user"></i>
Đăng nhập
</h2>

<form id="loginForm">

<div class="input">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Nhập Email"
required>

</div>

<div class="input">

<label>Mật khẩu</label>

<input
type="password"
id="password"
placeholder="Nhập mật khẩu"
required>

</div>

<button type="submit">

Đăng nhập

</button>

</form>

<p>

Chưa có tài khoản?

<a href="#">

Đăng ký

</a>

</p>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

if(email===""||password===""){

alert("Vui lòng nhập đầy đủ thông tin.");

return;

}

localStorage.setItem("login","true");

localStorage.setItem("email",email);

alert("Đăng nhập thành công!");

window.location="../index.html";

});

</script>

</body>
</html>
