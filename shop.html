<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Cửa hàng | Nguyenlong メ LiOS Store</title>

<link rel="stylesheet" href="../style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    background:#08111f;
    color:#fff;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:#101c32;
    position:sticky;
    top:0;
}

.products{
    width:90%;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:#111c30;
    border-radius:20px;
    overflow:hidden;
    transition:.35s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.info{
    padding:18px;
}

.price{
    color:#00bfff;
    font-size:22px;
    font-weight:bold;
    margin:12px 0;
}

.status{
    display:inline-block;
    padding:6px 14px;
    border-radius:20px;
    background:#00c853;
    font-size:12px;
    margin-bottom:12px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#00bfff;
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#008cff;
}

.category{

width:90%;
margin:auto;
display:flex;
gap:15px;
flex-wrap:wrap;

}

.category button{

width:auto;
padding:12px 20px;

}

</style>

</head>

<body>

<header>

<h2>
<i class="fa-solid fa-store"></i>
Nguyenlong メ LiOS Store
</h2>

<a href="../index.html" style="color:white;text-decoration:none;">
<i class="fa-solid fa-house"></i>
Trang chủ
</a>

</header>

<div class="category">

<button>Tất cả</button>

<button>LiOS</button>

<button>Premium</button>

<button>VIP</button>

<button>Dịch vụ</button>

</div>

<section class="products">

<div class="card">

<img src="../assets/products/product1.png">

<div class="info">

<h3>LiOS Premium</h3>

<div class="status">
ACTIVE
</div>

<div class="price">
199.000đ
</div>

<button class="buy">
Mua ngay
</button>

</div>

</div>

<div class="card">

<img src="../assets/products/product2.png">

<div class="info">

<h3>LiOS VIP</h3>

<div class="status">
ACTIVE
</div>

<div class="price">
299.000đ
</div>

<button class="buy">
Mua ngay
</button>

</div>

</div>

<div class="card">

<img src="../assets/products/product3.png">

<div class="info">

<h3>LiOS PRO</h3>

<div class="status">
ACTIVE
</div>

<div class="price">
499.000đ
</div>

<button class="buy">
Mua ngay
</button>

</div>

</div>

<div class="card">

<img src="../assets/products/product4.png">

<div class="info">

<h3>LiOS Platinum</h3>

<div class="status">
ACTIVE
</div>

<div class="price">
799.000đ
</div>

<button class="buy">
Mua ngay
</button>

</div>

</div>

</section>

<script>

document.querySelectorAll(".buy").forEach(btn=>{

btn.onclick=()=>{

let cart=JSON.parse(localStorage.getItem("cart"))||[];

cart.push({

name:btn.parentElement.querySelector("h3").innerText,

price:btn.parentElement.querySelector(".price").innerText

});

localStorage.setItem("cart",JSON.stringify(cart));

btn.innerHTML="✔ Đã thêm";

btn.style.background="#00c853";

setTimeout(()=>{

btn.innerHTML="Mua ngay";

btn.style.background="#00bfff";

},1200);

}

});

</script>

</body>
</html>
